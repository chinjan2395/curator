version: "3.8"
services:
  backend:
    build: ./backend
    image: curator_backend:php8.4
    container_name: curator_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=curator
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - REVERB_HOST=reverb
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: curator_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      # Vite proxy must hit the PHP container by service name (not localhost).
      - VITE_API_PROXY_TARGET=http://backend:8000
      - VITE_REVERB_APP_KEY=curator-key
      - VITE_REVERB_HOST=localhost
      - VITE_REVERB_PORT=8080
      - VITE_REVERB_SCHEME=http

  scheduler:
    image: curator_backend:php8.4
    container_name: curator_scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=curator
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - REVERB_HOST=reverb
    depends_on:
      mysql:
        condition: service_healthy

  queue:
    image: curator_backend:php8.4
    container_name: curator_queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --backoff=60 --max-time=3600
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=curator
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - REVERB_HOST=reverb
    depends_on:
      mysql:
        condition: service_healthy

  reverb:
    image: curator_backend:php8.4
    container_name: curator_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=curator
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8
    container_name: curator_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: curator
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

networks:
  default:
    driver: bridge
