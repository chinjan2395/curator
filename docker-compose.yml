version: "3.8"
services:
  backend:
    build: ./backend
    image: curator_backend:php8.4
    container_name: curator_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=curator
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: curator_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
      # Vite proxy must hit the PHP container by service name (not localhost).
      - VITE_API_PROXY_TARGET=http://backend:8000

  mysql:
    image: mysql:8
    container_name: curator_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: curator
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql

networks:
  default:
    driver: bridge
