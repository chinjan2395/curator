services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: curator_backend:php8.4
    container_name: curator_backend_service
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: curator
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: curator_backend_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: curator
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql

networks:
  default:
    driver: bridge
